<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Prompt Cookbook hero</title>
  <desc id="desc">A visual prompt cookbook banner with recipe cards and workflow lanes for Fabric tasks.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20123A"/>
      <stop offset="0.5" stop-color="#7A1F47"/>
      <stop offset="1" stop-color="#E86A33"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="480" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#FFE7C8" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="soft" x="-100" y="-100" width="1800" height="1100" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="52"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>
  <g filter="url(#soft)" opacity="0.52">
    <circle cx="1330" cy="160" r="130" fill="#FFD166"/>
    <circle cx="280" cy="220" r="140" fill="#7CFFCB"/>
    <circle cx="1210" cy="700" r="160" fill="#FF8FAB"/>
  </g>

  <text x="170" y="176" fill="#FFF4E6" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="2">PROMPT COOKBOOK</text>
  <text x="170" y="284" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="88" font-weight="800">Recipes your team</text>
  <text x="170" y="380" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="88" font-weight="800">will actually use.</text>
  <text x="170" y="444" fill="#FFE7C8" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="500">Copy-pasteable prompts for Codex and Copilot, grouped by real</text>
  <text x="170" y="486" fill="#FFE7C8" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="500">Fabric workflows: setup, discovery, deploys, jobs, OneLake, APIs, and ACLs.</text>

  <g transform="translate(980 126)">
    <rect width="420" height="260" rx="28" fill="url(#card)"/>
    <text x="34" y="56" fill="#6C1D45" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">Recipe card</text>
    <text x="34" y="102" fill="#3C2432" font-family="Consolas, monospace" font-size="22">Use $fab-discovery</text>
    <text x="34" y="136" fill="#3C2432" font-family="Segoe UI, Arial, sans-serif" font-size="22">inspect Analytics Dev.Workspace</text>
    <text x="34" y="166" fill="#3C2432" font-family="Segoe UI, Arial, sans-serif" font-size="22">and summarize what I can work with</text>
    <rect x="34" y="196" width="136" height="34" rx="17" fill="#FFB703"/>
    <text x="62" y="219" fill="#4D1F00" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">DISCOVER</text>
  </g>

  <g transform="translate(900 454)">
    <rect width="500" height="240" rx="28" fill="rgba(255,244,230,0.12)" stroke="rgba(255,255,255,0.25)"/>
    <text x="34" y="54" fill="#FFF4E6" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">Prompt flow</text>
    <rect x="34" y="90" width="118" height="76" rx="18" fill="#2DD4BF"/>
    <rect x="191" y="90" width="118" height="76" rx="18" fill="#FFD166"/>
    <rect x="348" y="90" width="118" height="76" rx="18" fill="#FF8FAB"/>
    <text x="58" y="137" fill="#082F30" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Inspect</text>
    <text x="227" y="137" fill="#573A00" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Act</text>
    <text x="376" y="137" fill="#5A1736" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Verify</text>
    <path d="M152 128H191" stroke="#FFF4E6" stroke-width="8" stroke-linecap="round"/>
    <path d="M309 128H348" stroke="#FFF4E6" stroke-width="8" stroke-linecap="round"/>
    <text x="34" y="206" fill="#FFE7C8" font-family="Segoe UI, Arial, sans-serif" font-size="22">The best prompts make the next action obvious.</text>
  </g>
</svg>
